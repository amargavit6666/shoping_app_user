<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maruti Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- DYNAMIC THEME VARIABLES (Default: Green Evolution) --- */
        :root {
            --primary: #2E7D32;
            --secondary: #43A047;
            --accent: #FFD700;
            --bg: #F3F3F3;
            --text: #232f3e;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 70px; padding-top: 60px; }

        /* --- OFFLINE BANNER --- */
        #offline-banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: rgba(0,0,0,0.8); color: white; display: none;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .offline-icon { font-size: 4rem; margin-bottom: 20px; color: #ccc; }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--primary); color: var(--white);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .app-brand { font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 15px; font-size: 1.2rem; }
        .badge { background: var(--accent); color: #000; font-size: 0.7rem; padding: 2px 5px; border-radius: 50%; position: absolute; margin-left: 10px; margin-top: -5px;}

        /* --- SEARCH --- */
        .search-bar-container { background: var(--primary); padding: 5px 15px 10px; position: fixed; top: 60px; width: 100%; z-index: 900; }
        .search-input { width: 100%; padding: 10px; border-radius: 5px; border: none; outline: none; }

        /* --- HOME LAYOUT --- */
        .main-container { padding-top: 50px; } /* Space for search bar */
        
        .section-title { padding: 15px 15px 5px; font-weight: bold; font-size: 1.1rem; }
        
        /* Categories */
        .cat-scroll { display: flex; overflow-x: auto; padding: 10px 15px; gap: 15px; background: var(--white); scrollbar-width: none; }
        .cat-item { min-width: 70px; display: flex; flex-direction: column; align-items: center; font-size: 0.8rem; }
        .cat-img { width: 50px; height: 50px; background: #eee; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        .card { background: var(--white); border-radius: 8px; overflow: hidden; padding-bottom: 10px; position: relative; }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-info { padding: 8px; }
        .price { font-size: 1.1rem; font-weight: bold; color: #000; }
        .mrp { font-size: 0.8rem; text-decoration: line-through; color: #777; }
        .discount { color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        .btn-add { background: var(--accent); border: none; width: 100%; padding: 8px; font-weight: bold; border-radius: 4px; margin-top: 5px; cursor: pointer; }

        /* --- PRODUCT DETAIL MODAL --- */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 100%; background: var(--white); z-index: 2000; transition: 0.3s; overflow-y: auto; padding-bottom: 80px; }
        .modal.active { bottom: 0; }
        .modal-header { position: sticky; top: 0; background: var(--white); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .pd-media { width: 100%; height: 300px; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pd-media img, .pd-media video { width: 100%; height: 100%; object-fit: contain; }
        .pd-content { padding: 15px; }
        .delivery-check { background: #f0f8ff; padding: 10px; margin: 10px 0; border-radius: 5px; display: flex; gap: 10px; }
        .delivery-check input { border: 1px solid #ccc; padding: 5px; width: 100px; }
        
        /* --- CART & CHECKOUT --- */
        .cart-view { display: none; padding: 80px 15px; }
        .cart-view.active { display: block; }
        .cart-item { display: flex; gap: 10px; background: var(--white); padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        
        .bottom-action { position: fixed; bottom: 0; width: 100%; background: var(--white); padding: 10px; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; z-index: 2001; }
        .total-price { font-size: 1.2rem; font-weight: bold; }
        .checkout-btn { background: var(--accent); padding: 10px 30px; border: none; font-weight: bold; border-radius: 5px; }

        /* --- BOTTOM NAV --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); height: 60px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: #555; }
        .nav-item i { font-size: 1.2rem; margin-bottom: 3px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="offline-banner">
        <div class="offline-icon"><i class="fas fa-wifi"></i></div>
        <h2>No Internet Connection</h2>
        <p>You are viewing cached products.</p>
        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px 20px;">Retry</button>
    </div>

    <header>
        <div class="app-brand">
            <i class="fas fa-bars"></i> 
            <span id="app-name-display">Maruti Store</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-user-circle" onclick="switchView('profile')"></i>
            <div style="position:relative;" onclick="switchView('cart')">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="search-bar-container">
        <input type="text" class="search-input" id="search-input" placeholder="Search by brand, product...">
    </div>

    <div id="view-home" class="main-container">
        <div class="cat-scroll" id="cat-list">
            </div>

        <div id="slider" style="height:150px; background:#ddd; margin-top:10px; display:flex; align-items:center; justify-content:center;">
            Loading Offers...
        </div>

        <h3 class="section-title">Recommended For You</h3>
        <div class="grid" id="product-grid">
            </div>
    </div>

    <div id="view-cart" class="cart-view">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        
        <div style="margin-top:20px; background:white; padding:15px; border-radius:5px;">
            <h3>Checkout Details</h3>
            <input type="text" id="cust-name" placeholder="Full Name" style="width:100%; margin:5px 0; padding:10px;">
            <input type="text" id="cust-addr" placeholder="Full Address with Pincode" style="width:100%; margin:5px 0; padding:10px;">
            <select id="pay-mode" style="width:100%; padding:10px; margin:5px 0;">
                <option value="COD">Cash on Delivery</option>
                <option value="UPI">UPI / Online</option>
            </select>
        </div>
        <div style="height:100px;"></div> </div>

    <div class="bottom-action" id="action-bar" style="display:none;">
        <div>Total: <span class="total-price" id="total-display">₹0</span></div>
        <button class="checkout-btn" onclick="processOrder()">Place Order</button>
    </div>

    <div class="modal" id="pd-modal">
        <div class="modal-header">
            <h3 id="pd-name-header">Product</h3>
            <i class="fas fa-times" onclick="closeModal()" style="font-size:1.5rem;"></i>
        </div>
        <div class="pd-media" id="pd-media-container">
            </div>
        <div class="pd-content">
            <h2 id="pd-name">Name</h2>
            <div style="color:#FFA41C; margin:5px 0;"><i class="fas fa-star"></i> 4.5 (120 Reviews)</div>
            <h1 class="price" id="pd-price" style="font-size:1.8rem;">₹0</h1>
            <p id="pd-desc" style="color:#555; margin:10px 0;">Description</p>
            
            <div class="delivery-check">
                <i class="fas fa-truck" style="margin-top:5px;"></i>
                <div>
                    <b>Delivery Check</b><br>
                    <input type="number" placeholder="Enter Pincode"> <button>Check</button>
                </div>
            </div>

            <button class="btn-add" style="padding:15px;" onclick="addToCartFromModal()">Add to Cart</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchView('home')"><i class="fas fa-home"></i>Home</div>
        <div class="nav-item"><i class="fas fa-heart"></i>Wishlist</div>
        <div class="nav-item" onclick="switchView('cart')"><i class="fas fa-shopping-cart"></i>Cart</div>
        <div class="nav-item"><i class="fas fa-box"></i>Orders</div>
    </nav>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9iD4tJvH1fyQRnG17lo-4160KQuSFCmw",
            authDomain: "amar-7b365.firebaseapp.com",
            databaseURL: "https://amar-7b365-default-rtdb.firebaseio.com",
            projectId: "amar-7b365",
            messagingSenderId: "1074209238712",
            appId: "1:1074209238712:web:453980e9e0eb7075f64e4d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // STATE
        let products = [];
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentProduct = null;
        let config = {};

        // 1. OFFLINE HANDLING
        window.addEventListener('offline', () => {
            document.getElementById('offline-banner').style.display = 'flex';
        });
        window.addEventListener('online', () => {
            document.getElementById('offline-banner').style.display = 'none';
            loadData(); // Re-sync
        });

        // 2. LOAD DATA & CONFIG
        function loadData() {
            // Fetch Config (Theme/Branding)
            db.ref('config').on('value', snap => {
                config = snap.val() || {};
                applyTheme(config);
            });

            // Fetch Products
            if(navigator.onLine) {
                db.ref('products').on('value', snap => {
                    products = [];
                    snap.forEach(c => products.push({id: c.key, ...c.val()}));
                    localStorage.setItem('cached_products', JSON.stringify(products)); // Cache it
                    renderProducts(products);
                });
            } else {
                // Load from Cache
                products = JSON.parse(localStorage.getItem('cached_products')) || [];
                renderProducts(products);
            }
        }

        function applyTheme(cfg) {
            const root = document.documentElement.style;
            if(cfg.primaryColor) root.setProperty('--primary', cfg.primaryColor);
            if(cfg.secondaryColor) root.setProperty('--secondary', cfg.secondaryColor);
            if(cfg.appName) document.getElementById('app-name-display').innerText = cfg.appName;
        }

        // 3. RENDER UI
        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            list.forEach(p => {
                grid.innerHTML += `
                    <div class="card" onclick="openProduct('${p.id}')">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="card-info">
                            <div style="height:40px; overflow:hidden; font-size:0.9rem;">${p.name}</div>
                            <div class="price">₹${p.price} <span class="mrp">₹${Math.round(p.price*1.2)}</span></div>
                            <div class="discount">20% OFF</div>
                            <button class="btn-add">Add</button>
                        </div>
                    </div>
                `;
            });
        }

        // 4. PRODUCT MODAL
        function openProduct(id) {
            currentProduct = products.find(p => p.id === id);
            document.getElementById('pd-name').innerText = currentProduct.name;
            document.getElementById('pd-price').innerText = "₹" + currentProduct.price;
            document.getElementById('pd-desc').innerText = currentProduct.description || 'No desc';
            
            // Video vs Image
            const mediaCont = document.getElementById('pd-media-container');
            if(currentProduct.videoUrl) {
                mediaCont.innerHTML = `<video src="${currentProduct.videoUrl}" controls autoplay muted loop></video>`;
            } else {
                mediaCont.innerHTML = `<img src="${currentProduct.image}">`;
            }
            
            document.getElementById('pd-modal').classList.add('active');
        }
        function closeModal() { document.getElementById('pd-modal').classList.remove('active'); }
        function addToCartFromModal() {
            addToCart(currentProduct);
            closeModal();
        }

        // 5. CART & WHATSAPP LOGIC
        function addToCart(p) {
            const exist = cart.find(x => x.id === p.id);
            if(exist) exist.qty++;
            else cart.push({...p, qty: 1});
            saveCart();
            alert("Added to Cart");
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.qty, 0);
        }

        function switchView(view) {
            document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
            document.getElementById('view-cart').classList.toggle('active', view === 'cart');
            
            if(view === 'cart') renderCart();
        }

        function renderCart() {
            const cont = document.getElementById('cart-items');
            cont.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                cont.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" width="50" height="50" style="object-fit:cover;">
                        <div style="flex:1;">
                            <b>${item.name}</b><br>
                            ₹${item.price} x ${item.qty}
                        </div>
                    </div>
                `;
            });
            document.getElementById('total-display').innerText = "₹" + total;
            document.getElementById('action-bar').style.display = total > 0 ? 'flex' : 'none';
        }

        function processOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-addr').value;
            const mode = document.getElementById('pay-mode').value;
            
            if(!name || !addr) return alert("Please fill details");

            // 1. Construct Message
            let msg = `🛒 *NEW ORDER REQUEST*\n`;
            msg += `👤 Name: ${name}\n📍 Addr: ${addr}\n💳 Mode: ${mode}\n\n`;
            msg += `📦 *ITEMS:*\n`;
            let total = 0;
            cart.forEach(i => {
                msg += `- ${i.name} (x${i.qty}) : ₹${i.price*i.qty}\n`;
                total += i.price * i.qty;
            });
            msg += `\n💰 *TOTAL: ₹${total}*`;
            msg += `\n📲 Source: App`;

            // 2. Save to DB (Online) or Queue (Offline)
            const orderData = { user: name, address: addr, items: cart, total, status: 'New', timestamp: Date.now() };
            
            if(navigator.onLine) {
                db.ref('orders').push(orderData);
            } else {
                // Simple offline queue
                let queue = JSON.parse(localStorage.getItem('offline_orders')) || [];
                queue.push(orderData);
                localStorage.setItem('offline_orders', JSON.stringify(queue));
                alert("You are offline. Order saved and will sync when online.");
            }

            // 3. Open WhatsApp (Deep Link)
            const adminPhone = config.whatsappNumber || "919999999999";
            const url = `https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`;
            window.location.href = url;
            
            // Clear Cart
            cart = []; saveCart(); switchView('home');
        }

        // Init
        loadData();
    </script>
</body>
</html>
